backend = "glx";
vsync = true;

shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.75;

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

shadow-exclude = [
    "class_g = 'Dmenu'",
    "class_g = 'Rofi'",
    "class_g = 'Polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

opacity-rule = [
    "100:class_g = 'Polybar'"
];